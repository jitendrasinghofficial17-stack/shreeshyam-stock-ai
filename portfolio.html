<!DOCTYPE html>
<html>
<head>

<title>Portfolio AI Analyzer</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

.card{
background:#111827;
padding:20px;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>AI Portfolio Analyzer</h1>

<p>Enter your stocks</p>

<input id="s1" placeholder="Stock 1">
<input id="s2" placeholder="Stock 2">
<input id="s3" placeholder="Stock 3">

<br><br>

<button onclick="analyzePortfolio()">Analyze Portfolio</button>

<div class="card" id="result"></div>


<script>

function analyzePortfolio(){

let s1=document.getElementById("s1").value;
let s2=document.getElementById("s2").value;
let s3=document.getElementById("s3").value;

let risk="Medium";
let suggestion="Diversify into Banking & Pharma";

document.getElementById("result").innerHTML=

"Portfolio Stocks:<br>"+s1+"<br>"+s2+"<br>"+s3+

"<br><br>AI Risk Level: "+risk+

"<br>AI Suggestion: "+suggestion;

}

</script>

</body>
</html>
