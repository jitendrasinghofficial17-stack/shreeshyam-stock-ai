<!DOCTYPE html>
<html>
<head>

<title>ShreeShyamStockAI Login</title>

<style>

body{
font-family:Arial;
background:#0b132b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
border:none;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3e8e41;
}

a{
display:block;
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>ShreeShyamStockAI</h2>

<p>Login to access Premium Dashboard</p>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<a href="subscribe.html">Subscribe ₹2999 / Month</a>

</div>

<script>

function login(){

var email=document.getElementById("email").value;
var password=document.getElementById("password").value;

if(email=="admin@shreeshyam.com" && password=="123456"){

window.location.href="dashboard.html";

}

else{

alert("Invalid login details");

}

}

</script>

</body>
</html>
