<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShreeShyam AI Login</title>

<style>

body{
font-family: Arial;
background:#0b132b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#00c853;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#009624;
}

.subscribe{
margin-top:15px;
display:block;
color:#0066ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>ShreeShyamStockAI</h2>

<p>Login to access Premium Dashboard</p>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<a class="subscribe" href="subscribe.html">
Subscribe ₹2999 / Month
</a>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email=="" || password==""){
alert("Please enter email and password");
return;
}

if(email=="admin@shreeshyam.com" && password=="123456"){

window.location.href="dashboard.html";

}

else{

alert("Invalid Login. Please subscribe first.");

window.location.href="subscribe.html";

}

}

</script>

</body>
</html>
