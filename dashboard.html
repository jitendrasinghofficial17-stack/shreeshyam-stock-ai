<!DOCTYPE html>
<html>

<head>

<title>ShreeShyam AI Terminal</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

button{
padding:12px 25px;
margin:10px;
background:orange;
border:none;
font-size:16px;
cursor:pointer;
}

.card{
border:1px solid gray;
padding:20px;
margin:20px;
}

</style>

<script>

// LOGIN PROTECTION
if(localStorage.getItem("user")!="logged"){
window.location="login.html";
}

// LOGOUT
function logout(){
localStorage.removeItem("user");
window.location="login.html";
}

// LOAD LIVE MARKET
async function loadMarket(){

let res = await fetch("/api/market");

let data = await res.json();

let html="";

data.forEach(s=>{

html += `
<div>
<b>${s.name}</b>
₹${s.price}
(${s.change.toFixed(2)}%)
</div>
`;

});

document.getElementById("market").innerHTML = html;

}


// MULTIBAGGER SCANNER
async function loadMulti(){

let res = await fetch("/api/multibagger");

let data = await res.json();

let html="";

data.stocks.forEach(s=>{

html += `
<div>
<b>${s.name}</b>
AI Score: ${s.score}
</div>
`;

});

document.getElementById("multi").innerHTML = html;

}


// PREMIUM CHECK
function checkPremium(){

if(localStorage.getItem("premium")!="yes"){

alert("Premium feature. Upgrade required.");

window.location="premium.html";

}

}

</script>

</head>


<body>

<h1>ShreeShyam AI Dashboard</h1>


<div class="card">

<h2>Live Market</h2>

<button onclick="loadMarket()">Load Market</button>

<div id="market"></div>

</div>



<div class="card">

<h2>AI Multibagger Scanner</h2>

<button onclick="loadMulti()">Find Multibaggers</button>

<div id="multi"></div>

</div>



<div class="card">

<h2>Premium Features</h2>

<a href="premium.html">

<button>Upgrade to Premium</button>

</a>

</div>


<button onclick="logout()">Logout</button>


</body>

</html>
