<!DOCTYPE html>
<html>
<head>

<title>ShreeShyam AI Terminal</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
margin:0;
}

.topbar{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
}

.green{color:#00ff9c}
.red{color:#ff4c4c}

</style>

</head>

<body>

<div class="topbar">
<div>ShreeShyam Stock AI Terminal</div>
<div>NIFTY <span class="green">+0.72%</span></div>
</div>

<div class="container">

<div class="card">
<h3>Stock Search</h3>
<input id="stock" placeholder="Enter stock name">
<button onclick="analyze()">Analyze</button>
<div id="result"></div>
</div>

<div class="card">
<h3>Top AI Picks</h3>
<p>RELIANCE</p>
<p>TCS</p>
<p>INFY</p>
</div>

<div class="card">
<h3>AI Analysis</h3>
<p>AI Score: 8.2</p>
<p>Trend: Bullish</p>
<p>Risk: Medium</p>
</div>

<div class="card">
<h3>Multibagger Watch</h3>
<p>KPIT</p>
<p>CG Power</p>
<p>Kaynes</p>
</div>

</div>

<script>

async function analyze(){

let stock=document.getElementById("stock").value;

let res=await fetch("/api/analyze?stock="+stock);

let data=await res.json();

document.getElementById("result").innerText=JSON.stringify(data);

}

</script>

</body>
</html>
