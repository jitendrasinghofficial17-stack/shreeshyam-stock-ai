<!DOCTYPE html>
<html>

<head>
<title>ShreeShyamStockAI Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#111827;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#4ade80;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.main{
margin-left:240px;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.market{
display:flex;
gap:20px;
}

.market div{
background:#111827;
padding:15px;
border-radius:10px;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px;
background:#4ade80;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>StockAI</h2>

<a href="#">Dashboard</a>
<a href="#">AI Analyzer</a>
<a href="#">Multibagger Finder</a>
<a href="#">Portfolio</a>
<a href="#">Market News</a>

</div>

<div class="main">

<h1>Market Overview</h1>

<div class="market">

<div>
NIFTY 50  
<br>
22,500  
</div>

<div>
SENSEX  
<br>
74,200  
</div>

<div>
BANKNIFTY  
<br>
48,100  
</div>

</div>

<div class="card">

<h2>AI Stock Analyzer</h2>

<input type="text" id="stock" placeholder="Enter stock">

<button onclick="analyze()">Analyze</button>

<p id="result"></p>

</div>

<div class="card">

<h2>Watchlist</h2>

<ul>

<li>Reliance</li>
<li>TCS</li>
<li>Infosys</li>
<li>HDFC Bank</li>

</ul>

</div>

</div>

<script>

async function analyze(){

let stock=document.getElementById("stock").value

let res=await fetch("/api/analyze?stock="+stock)

let data=await res.json()

document.getElementById("result").innerText =
data.choices[0].message.content

}

</script>

</body>
</html>
