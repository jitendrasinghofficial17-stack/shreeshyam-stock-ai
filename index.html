<h2>AI Stock Analyzer</h2>

<input id="stock" placeholder="Enter stock name">

<button onclick="analyzeStock()">Analyze</button>

<div id="result" style="margin-top:20px;color:white;font-size:18px;"></div>
<script>

async function analyzeStock(){

const stock = document.getElementById("stock").value;

if(!stock){
alert("Enter stock name");
return;
}

document.getElementById("result").innerText = "Analyzing...";

try{

const response = await fetch("/api/analyze?stock=" + stock);

const data = await response.json();

document.getElementById("result").innerText = data.result;

}

catch(err){

document.getElementById("result").innerText = "Error fetching analysis";

}

}

</script>
