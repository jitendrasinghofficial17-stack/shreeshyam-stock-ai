<!DOCTYPE html>
<html>
<head>

<title>ShreeShyamStockAI</title>

<style>

body{
background:#0b1736;
font-family:Arial;
color:white;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#111c44;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#4ade80;
}

.sidebar a{
display:block;
margin:15px 0;
color:white;
cursor:pointer;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input{
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#4ade80;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>StockAI</h2>

<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('analyzer')">AI Analyzer</a>
<a onclick="showPage('multibagger')">Multibagger Finder</a>

</div>

<div class="main">

<div id="dashboard">

<h1>Market Overview</h1>

<div class="card">

<h2>AI Stock Analyzer</h2>

<input id="stock" placeholder="Enter stock name">

<button onclick="analyzeStock()">Analyze</button>

<div id="result" class="result"></div>

</div>

</div>

<div id="multibagger" style="display:none">

<h1>Multibagger Finder</h1>

<div class="card">

Possible Multibaggers:

<ul>

<li>Tata Elxsi</li>
<li>KPIT Tech</li>
<li>Dixon Technologies</li>

</ul>

</div>

</div>

</div>

<script>

function showPage(page){

document.getElementById("dashboard").style.display="none";
document.getElementById("multibagger").style.display="none";

if(page==="dashboard"){
document.getElementById("dashboard").style.display="block";
}

if(page==="multibagger"){
document.getElementById("multibagger").style.display="block";
}

}

async function analyzeStock(){

const stock=document.getElementById("stock").value;

if(stock===""){
alert("Enter stock name");
return;
}

document.getElementById("result").innerHTML="Analyzing...";

const res=await fetch("/api/analyze?stock="+stock);

const data=await res.json();

document.getElementById("result").innerHTML=data.result;

}

</script>

</body>
</html>
