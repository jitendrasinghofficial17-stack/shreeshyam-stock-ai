<!DOCTYPE html>
<html>

<head>
<title>ShreeShyamStockAI</title>

<style>

body{
background:#0b1736;
font-family:Arial;
color:white;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#111c44;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#4ade80;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

input{
padding:10px;
width:250px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#4ade80;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>StockAI</h2>
</div>

<div class="main">

<h1>AI Stock Analyzer</h1>

<div class="card">

<input id="stock" placeholder="Enter stock name">

<button onclick="analyzeStock()">Analyze</button>

<p id="result"></p>

</div>

</div>

<script>

async function analyzeStock(){

const stock = document.getElementById("stock").value;

if(!stock){
alert("Enter stock name");
return;
}

document.getElementById("result").innerText="Analyzing...";

const response = await fetch("/api/analyze?stock="+stock);

const data = await response.json();

document.getElementById("result").innerText = data.result;

}

</script>

</body>
</html>
